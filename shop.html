<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر العافية | تسوق المنتجات</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/shop.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        medical: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            light: '#bae6fd',
                            DEFAULT: '#0ea5e9',
                            dark: '#0284c7',
                            900: '#0c4a6e',
                            green: '#10b981'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="text-slate-800 flex flex-col min-h-screen selection:bg-medical selection:text-white">

    <header class="glass-nav shadow-sm border-b border-slate-200 sticky top-0 z-50 transition-all duration-300">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            
            <button onclick="toggleMobileMenu()" class="md:hidden text-slate-700 text-2xl p-2 focus:outline-none">
                <i class="fa-solid fa-bars"></i>
            </button>

            <a href="index.html" class="flex items-center justify-center transform hover:scale-105 transition duration-300">
                <img src="assets/logoo.jpg" alt="شعار العافية" class="h-12 sm:h-14 md:h-16 lg:h-20 object-contain mix-blend-multiply" onerror="this.src='https://via.placeholder.com/200x80?text=Al-Aafia'">
            </a>

            <nav class="hidden md:flex gap-6 lg:gap-8 font-bold text-slate-600">
                <a href="index.html" class="hover:text-medical border-b-2 border-transparent hover:border-medical transition py-2 text-sm lg:text-base">الرئيسية</a>
                <a href="shop.html" class="text-medical border-b-2 border-medical transition py-2 text-sm lg:text-base">المنتجات</a>
            </nav>

            <button onclick="toggleCart()" class="relative p-2 sm:p-3 text-slate-700 hover:text-medical bg-slate-100 hover:bg-medical-50 rounded-full transition duration-300 shadow-sm">
                <i class="fa-solid fa-cart-shopping text-lg sm:text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] sm:text-xs font-bold rounded-full h-5 w-5 sm:h-6 sm:w-6 flex items-center justify-center shadow-md border border-white">0</span>
            </button>
        </div>
    </header>

    <div id="mobile-menu" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[60] hidden transition-opacity">
        <div class="bg-white w-3/4 h-full shadow-2xl p-6 transform transition-transform duration-300 flex flex-col">
            <div class="flex justify-between items-center mb-8 pb-4 border-b border-slate-100">
                <img src="assets/logoo.jpg" alt="الشعار" class="h-10 object-contain mix-blend-multiply">
                <button onclick="toggleMobileMenu()" class="text-slate-500 hover:text-red-500 text-2xl">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <nav class="flex flex-col gap-6 font-bold text-lg text-slate-700">
                <a href="index.html" class="hover:text-medical flex items-center gap-3"><i class="fa-solid fa-house text-medical"></i> الرئيسية</a>
                <a href="shop.html" class="text-medical flex items-center gap-3"><i class="fa-solid fa-box-open"></i> المنتجات</a>
            </nav>
        </div>
    </div>

    <div class="bg-slate-900 text-white py-12 md:py-16 text-center border-b-4 border-medical relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] pointer-events-none"></div>
        <h1 class="text-3xl md:text-4xl font-black mb-3 relative z-10">تسوق <span class="text-medical">المنتجات</span></h1>
        <p class="text-slate-400 text-sm md:text-base relative z-10 max-w-lg mx-auto px-4">تصفح جميع المعدات والأجهزة الطبية والمخبرية .</p>
    </div>

    <div class="bg-white border-b border-slate-200 shadow-sm sticky top-[60px] md:top-[88px] z-40">
        <div class="container mx-auto px-4 py-4">
            <div class="flex overflow-x-auto gap-3 pb-2 custom-scroll items-center" id="categories-container">
            </div>
        </div>
    </div>

    <section class="py-12 md:py-16 flex-grow bg-slate-50">
        <div class="container mx-auto px-4">
            
            <div id="loading-spinner" class="flex flex-col justify-center items-center py-12 md:py-20">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl md:text-5xl text-medical mb-4"></i>
                <span class="text-slate-500 font-bold text-base md:text-lg">جاري تحميل المنتجات...</span>
            </div>

            <div id="product-list" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-8 hidden">
            </div>
        </div>
    </section>

    <footer class="bg-slate-900 text-slate-400 py-8 text-center text-sm border-t border-slate-800">
        <div class="container mx-auto px-4">
            <p>&copy; 2026 جميع الحقوق محفوظة لمتجر العافية للمعدات الطبية.</p>
        </div>
    </footer>

    <a id="floating-wa" href="#" target="_blank" class="fixed bottom-6 left-6 md:bottom-8 md:left-8 bg-[#25D366] text-white w-14 h-14 md:w-16 md:h-16 rounded-full flex items-center justify-center text-3xl md:text-4xl shadow-2xl z-[45] hover:bg-green-500 transition-colors wa-float hidden">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <div id="cart-sidebar" class="fixed inset-y-0 left-0 w-full sm:w-[350px] md:w-[400px] bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 z-[70] flex flex-col">
        <div class="p-4 md:p-5 bg-slate-900 text-white flex justify-between items-center border-b-4 border-medical">
            <h2 class="text-lg md:text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-basket-shopping text-medical"></i> سلة مشترياتك
            </h2>
            <button onclick="toggleCart()" class="text-slate-400 hover:text-white bg-slate-800 hover:bg-red-500 w-8 h-8 rounded-full flex items-center justify-center transition">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div id="cart-items" class="flex-1 overflow-y-auto p-3 md:p-4 space-y-3 bg-slate-50">
            <div class="text-center text-slate-400 mt-16 md:mt-20 flex flex-col items-center" id="empty-cart-msg">
                <div class="w-20 h-20 md:w-24 md:h-24 bg-slate-100 rounded-full flex items-center justify-center mb-3 md:mb-4 text-3xl md:text-4xl">
                    <i class="fa-solid fa-cart-arrow-down"></i>
                </div>
                <p class="font-bold text-base md:text-lg text-slate-600">السلة فارغة حالياً</p>
                <p class="text-xs md:text-sm mt-1 md:mt-2">قم بإضافة بعض الأجهزة الرائعة!</p>
            </div>
        </div>
        
        <div class="p-4 md:p-6 bg-white border-t border-slate-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between items-center mb-4 md:mb-6">
                <span class="text-slate-500 font-bold text-sm md:text-base">المبلغ الإجمالي:</span>
                <span id="cart-total" class="text-xl md:text-2xl font-black text-slate-800">0 <span class="text-xs md:text-sm text-slate-500">ج.س</span></span>
            </div>
            <button onclick="checkout()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 md:py-4 rounded-xl transition shadow-lg shadow-green-500/30 flex justify-center items-center gap-2 text-base md:text-lg">
                <i class="fa-brands fa-whatsapp text-xl md:text-2xl"></i> إرسال الطلب عبر واتساب
            </button>
        </div>
    </div>
    
    <div id="cart-overlay" onclick="closeAllOverlays()" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-[55] transition-opacity"></div>

    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 md:translate-x-0 md:left-auto md:right-6 bg-slate-800 text-white px-4 py-3 md:px-6 md:py-4 rounded-xl shadow-2xl transform translate-y-24 opacity-0 transition-all duration-300 z-[80] flex items-center gap-3 md:gap-4 border-b-4 md:border-b-0 md:border-r-4 border-medical w-11/12 max-w-sm md:w-auto md:min-w-[300px]">
        <div class="w-8 h-8 md:w-10 md:h-10 bg-medical/20 rounded-full flex items-center justify-center text-medical flex-shrink-0">
            <i id="toast-icon" class="fa-solid fa-check text-lg md:text-xl"></i>
        </div>
        <span id="toast-message" class="font-bold text-sm md:text-base">تمت الإضافة بنجاح!</span>
    </div>

    <script src="js/shop.js"></script>
</body>
</html>
